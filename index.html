<meta charset="utf-8" />
<title>Prizma</title>
<style>
  :root{
    --ground:#0E1318;
    --surface:#161D26;
    --surface-2:#1B232E;
    --text:#E8E2D5;
    --muted:#8B93A0;
    --faint:#5A626E;
    --accent:#E9A53C;
    --accent-2:#6FA2CE;
    --line:rgba(233,165,60,.14);
    --line-cool:rgba(111,162,206,.16);
    --good:#7FB069;
    --bad:#D2654E;
    --mono:ui-monospace,"Cascadia Code","Cascadia Mono","Consolas","SFMono-Regular",monospace;
    --sans:"Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(900px 500px at 88% -10%,rgba(111,162,206,.06),transparent 60%),
      radial-gradient(800px 600px at 0% 0%,rgba(233,165,60,.05),transparent 55%),
      var(--ground);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{background:rgba(233,165,60,.28)}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}

  /* ---------- header ---------- */
  header.bar{
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:16px 24px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(27,35,46,.6),rgba(14,19,24,.2));
    position:sticky;top:0;z-index:30;
    backdrop-filter:blur(8px);
  }
  .brand{display:flex;align-items:baseline;gap:12px;margin-right:auto}
  .glyph{
    font-family:var(--mono);color:var(--accent);font-size:20px;letter-spacing:-1px;
    text-shadow:0 0 14px rgba(233,165,60,.45);
  }
  .brand h1{font-size:17px;margin:0;font-weight:650;letter-spacing:.14em;text-transform:uppercase}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.04em}
  .tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .search{
    display:flex;align-items:center;gap:7px;background:var(--surface);
    border:1px solid var(--line-cool);border-radius:7px;padding:7px 10px;
  }
  .search input{background:none;border:none;color:var(--text);outline:none;width:140px;font-size:13px}
  .search input::placeholder{color:var(--faint)}
  .search span{color:var(--faint);font-family:var(--mono);font-size:12px}
  .btn{
    background:var(--surface);color:var(--text);border:1px solid var(--line-cool);
    border-radius:7px;padding:8px 12px;font-size:12.5px;font-weight:550;
    display:inline-flex;align-items:center;gap:6px;transition:border-color .15s,background .15s,color .15s;
  }
  .btn:hover{border-color:var(--accent-2);background:var(--surface-2)}
  .btn.primary{border-color:var(--line);color:var(--accent)}
  .btn.primary:hover{background:rgba(233,165,60,.1);border-color:var(--accent)}
  .btn.ghost{background:none;border-color:transparent;color:var(--muted)}
  .btn.ghost:hover{color:var(--text);background:var(--surface)}
  .btn.sm{padding:6px 9px;font-size:11.5px}

  /* ---------- data-source bar ---------- */
  .srcbar{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:9px 24px;border-bottom:1px solid var(--line-cool);
    background:rgba(27,35,46,.35);font-size:12.5px;
  }
  .status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px}
  .sdot{width:9px;height:9px;border-radius:50%;flex:none}
  .sdot.on{background:var(--good);box-shadow:0 0 8px rgba(127,176,105,.7)}
  .sdot.warn{background:var(--accent);box-shadow:0 0 8px rgba(233,165,60,.6)}
  .sdot.off{background:var(--faint)}
  .status .path{color:var(--muted);max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .status .path b{color:var(--text)}
  .srcbar .spacer{margin-left:auto}
  .srcbar .hint{color:var(--faint)}

  /* ---------- ticker tape ---------- */
  .tape{overflow:hidden;border-bottom:1px solid var(--line);
    background:linear-gradient(90deg,rgba(14,19,24,.9),rgba(27,35,46,.5),rgba(14,19,24,.9));position:relative}
  .tape::before,.tape::after{content:"";position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none}
  .tape::before{left:0;background:linear-gradient(90deg,var(--ground),transparent)}
  .tape::after{right:0;background:linear-gradient(270deg,var(--ground),transparent)}
  .tape-track{display:inline-flex;gap:34px;padding:9px 0;white-space:nowrap;
    animation:scroll 60s linear infinite;font-family:var(--mono);font-size:12.5px}
  .tape:hover .tape-track{animation-play-state:paused}
  .tape-item{color:var(--muted)}
  .tape-item b{color:var(--accent);font-weight:600;letter-spacing:.02em}
  .tape-item .nm{color:var(--faint)}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion:reduce){.tape-track{animation:none}}

  /* ---------- stats strip ---------- */
  .stats{display:flex;gap:0;flex-wrap:wrap;padding:0 24px;border-bottom:1px solid var(--line)}
  .stat{padding:14px 26px 14px 0;margin-right:26px;border-right:1px solid var(--line-cool);
    display:flex;flex-direction:column;gap:2px}
  .stat:last-child{border-right:none}
  .stat .n{font-family:var(--mono);font-size:24px;font-weight:600;color:var(--text);line-height:1}
  .stat .n.amber{color:var(--accent)}
  .stat .l{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}

  /* ---------- sector filter ---------- */
  .filterbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;padding:13px 24px;border-bottom:1px solid var(--line)}
  .flabel{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-right:4px}
  .fchip{background:var(--surface);border:1px solid var(--line-cool);border-radius:7px;
    padding:6px 11px;font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:7px;
    transition:border-color .14s,color .14s,background .14s}
  .fchip:hover{color:var(--text);border-color:var(--accent-2)}
  .fchip.on{color:var(--accent);border-color:var(--accent);background:rgba(233,165,60,.08)}
  .fchip .fc{font-family:var(--mono);font-size:10px;color:var(--faint);background:rgba(255,255,255,.05);
    border-radius:4px;padding:0 5px;line-height:16px}
  .fchip.on .fc{color:var(--accent)}

  /* ---------- grid ---------- */
  main{padding:26px 24px 60px;max-width:1500px;margin:0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px}
  .card{background:linear-gradient(180deg,var(--surface-2),var(--surface));
    border:1px solid var(--line-cool);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .card-head{padding:16px 16px 12px;border-bottom:1px solid var(--line-cool)}
  .card-top{display:flex;align-items:flex-start;gap:10px}
  .idx{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--line);
    border-radius:5px;padding:2px 6px;line-height:1;margin-top:3px;flex:none}
  .card h2{font-size:15.5px;margin:0;font-weight:620;flex:1;letter-spacing:.01em}
  .card-actions{display:flex;gap:2px;flex:none}
  .iconbtn{background:none;border:none;color:var(--faint);font-family:var(--mono);font-size:13px;
    padding:3px 6px;border-radius:5px;line-height:1}
  .iconbtn:hover{color:var(--text);background:rgba(255,255,255,.05)}
  .iconbtn.del:hover{color:var(--bad)}
  .thesis{font-size:12.5px;color:var(--muted);margin:9px 0 0 4px;line-height:1.5;padding-left:12px;border-left:2px solid var(--line-cool)}
  .card-body{padding:12px 16px 6px;flex:1}
  .empty-note{font-size:12px;color:var(--faint);font-style:italic;padding:6px 0 12px}
  .co{padding:11px 0;border-top:1px solid rgba(255,255,255,.04)}
  .co::after{content:"";display:block;clear:both}
  .co:first-child{border-top:none}
  .co .tkr{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent-2);letter-spacing:.02em}
  .co .meta{min-width:0}
  .co .nm{font-size:13px;font-weight:550;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .co .note{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45;white-space:pre-wrap}
  .size-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--faint);border:1px solid var(--line-cool);border-radius:4px;padding:1px 5px}
  .conv{display:inline-flex;gap:3px;align-items:center}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.13)}
  .dot.on{background:var(--accent);box-shadow:0 0 6px rgba(233,165,60,.5)}
  .co-right{float:right;margin-left:12px;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .co-tools{display:flex;gap:1px}
  .co-id{float:left;width:150px;margin-right:16px;display:flex;flex-direction:column;gap:3px;align-items:flex-start}
  .px{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .chg{font-weight:600}
  .chg.up{color:var(--good)}
  .chg.down{color:var(--bad)}
  .mc-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:var(--accent-2);
    border:1px solid var(--line-cool);border-radius:4px;padding:1px 5px}
  .pxstat{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .pxstat b{color:var(--text)}
  .srcsep{width:1px;height:18px;background:var(--line-cool);display:inline-block;margin:0 4px}
  .metrics{display:flex;flex-direction:column;gap:3px;margin-top:5px;width:100%}
  .m{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap}
  .m b{color:var(--text);font-weight:600}
  .m b.up{color:var(--good)}
  .m b.down{color:var(--bad)}
  .tkr.live{cursor:pointer}
  .tkr.live:hover{text-decoration:underline}
  .spark{display:block;margin-top:6px;border-radius:4px;cursor:pointer}
  .co.cofx{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .cofx-fin{flex:none;width:165px;display:flex;flex-direction:column;gap:5px}
  .cofx-id{display:flex;flex-direction:column;gap:2px}
  .cofx-cv{display:flex;align-items:center;gap:9px;margin-top:3px}
  .cofx-text{flex:1;min-width:200px}
  .cofx-name{font-size:13px;font-weight:550;margin-bottom:5px}
  .cochart-wrap{flex:none;width:280px}
  .irange{display:flex;gap:3px;margin-bottom:6px;background:var(--ground);
    border:1px solid var(--line-cool);border-radius:7px;padding:3px}
  .ir{flex:1;background:none;border:none;color:var(--muted);border-radius:5px;
    padding:4px 0;font-family:var(--mono);font-size:10.5px;cursor:pointer}
  .ir:hover{color:var(--text)}
  .ir.on{background:rgba(233,165,60,.12);color:var(--accent)}
  .cochart{display:block;width:280px;height:200px;background:rgba(0,0,0,.18);
    border:1px solid var(--line-cool);border-radius:10px;cursor:pointer}
  .cochart.noh{display:flex;align-items:center;justify-content:center;color:var(--faint);
    font-size:11px;cursor:default;height:200px}
  .sec-stats{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px;
    display:inline-flex;gap:7px;align-items:center;border:1px solid var(--line-cool);border-radius:6px;padding:3px 9px}
  .sec-stats b{color:var(--accent);font-weight:600}
  .sec-stats .dim{color:var(--faint)}
  /* sektör içi sıralama */
  .sortbar{display:inline-flex;align-items:center;gap:6px;margin-top:8px;margin-left:8px;vertical-align:middle}
  .sortbar .slabel{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .sortsel{background:var(--surface);border:1px solid var(--line-cool);color:var(--text);border-radius:6px;
    padding:3px 7px;font-family:var(--mono);font-size:11px;outline:none}
  .sortsel:focus{border-color:var(--accent-2)}
  .sortdir{background:var(--surface);border:1px solid var(--line-cool);color:var(--accent);border-radius:6px;
    padding:3px 9px;font-family:var(--mono);font-size:12px;line-height:1}
  .sortdir:hover:not(:disabled){border-color:var(--accent)}
  .sortdir:disabled{color:var(--faint);opacity:.45;cursor:default}
  /* kart başlığı: sol metin + sağ doygunluk grafiği */
  .ch-row{display:flex;gap:14px;align-items:flex-start}
  .ch-main{flex:1;min-width:0}
  .ch-chart{flex:none}
  .secz-val{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .secz-val.hot{color:var(--accent)}
  .secz-val.cold{color:var(--accent-2)}
  .secz-val.mid{color:var(--muted)}
  /* eksenli doygunluk grafiği (her görünümde sağda) */
  .seczbig-wrap{margin-top:0}
  .seczbig-head{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .seczbig{display:block;max-width:100%;height:auto;background:rgba(0,0,0,.18);border:1px solid var(--line-cool);border-radius:8px}
  @media(max-width:560px){.ch-row{flex-direction:column}.ch-chart{width:100%}}
  /* sektör rotasyonu paneli */
  .rotation{padding:0 24px;border-bottom:1px solid var(--line)}
  .rotation:empty{border-bottom:none;padding:0}
  .rot-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 0 8px}
  .rot-title{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
  .rot-win{display:inline-flex;gap:3px;background:var(--surface);border:1px solid var(--line-cool);border-radius:7px;padding:3px}
  .rotwin{background:none;border:none;color:var(--muted);border-radius:5px;padding:3px 10px;font-family:var(--mono);font-size:11px}
  .rotwin:hover{color:var(--text)}
  .rotwin.on{background:rgba(233,165,60,.12);color:var(--accent)}
  .rot-klabel{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .rot-ref{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .rot-ref b{font-weight:600;color:var(--muted)}
  .rot-ref b.up{color:var(--good)}
  .rot-ref b.down{color:var(--bad)}
  .rot-spacer{margin-left:auto}
  .rot-toggle{background:none;border:none;color:var(--faint);font-family:var(--mono);font-size:11px}
  .rot-toggle:hover{color:var(--text)}
  .rot-list{display:flex;flex-direction:column;gap:2px;padding-bottom:10px}
  .rot-row{display:flex;align-items:center;gap:10px;padding:3px 0}
  .rot-name{flex:0 0 180px;font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rot-row.lag .rot-name{color:var(--muted)}
  .rot-colhead{padding-bottom:3px!important;border-bottom:1px solid var(--line-cool);margin-bottom:4px}
  .rot-colhead span{color:var(--faint)!important;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
  .rot-track{flex:1;position:relative;height:14px;background:rgba(255,255,255,.03);border-radius:3px;min-width:120px}
  .rot-mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.14)}
  .rot-bar{position:absolute;top:2px;bottom:2px;border-radius:2px;min-width:1px}
  .rot-bar.pos{background:linear-gradient(90deg,rgba(127,176,105,.45),var(--good))}
  .rot-bar.neg{background:linear-gradient(270deg,rgba(210,101,78,.45),var(--bad))}
  .rot-ret{flex:0 0 54px;text-align:right;font-family:var(--mono);font-size:12px;font-weight:600}
  .rot-ret.up{color:var(--good)}
  .rot-ret.down{color:var(--bad)}
  .rot-exc{flex:0 0 52px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .rot-exc.up{color:var(--good)}
  .rot-exc.down{color:var(--bad)}
  .rot-exc.dim{color:var(--faint)}
  .rot-tz{flex:0 0 54px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--faint)}
  .rot-tz.hot{color:var(--accent)}
  .rot-tz.cold{color:var(--accent-2)}
  .rot-tz.mid,.rot-tz.dim{color:var(--faint)}
  .rot-meta{flex:0 0 74px;text-align:right;font-family:var(--mono);font-size:10px;color:var(--faint)}
  .rot-empty,.rot-nodata{font-family:var(--mono);font-size:11px;color:var(--faint);padding:4px 0 10px}
  @media(max-width:760px){.rot-name{flex-basis:110px}.rot-meta,.rot-exc{display:none}}
  /* chart modal */
  .modal[hidden]{display:none}
  .modal{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center}
  .modal-bg{position:absolute;inset:0;background:rgba(6,9,12,.72);backdrop-filter:blur(2px)}
  .modal-card{position:relative;background:linear-gradient(180deg,var(--surface-2),var(--surface));
    border:1px solid var(--line);border-radius:14px;padding:18px;width:min(560px,92vw);
    box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .modal-x{position:absolute;top:11px;right:13px;background:none;border:none;color:var(--faint);
    font-family:var(--mono);font-size:15px;line-height:1}
  .modal-x:hover{color:var(--text)}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin:0 24px 12px 0}
  .mh-t b{font-family:var(--mono);font-size:18px;color:var(--accent-2);letter-spacing:.02em}
  .mh-n{color:var(--muted);font-size:13px}
  .mh-px{font-family:var(--mono);font-size:16px;white-space:nowrap}
  .modal-range{display:flex;gap:6px;margin-bottom:11px}
  .rbtn{background:var(--surface);border:1px solid var(--line-cool);color:var(--muted);border-radius:6px;
    padding:4px 13px;font-family:var(--mono);font-size:12px}
  .rbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(233,165,60,.08)}
  #chartCanvas{width:100%;height:auto;display:block;background:rgba(0,0,0,.18);
    border:1px solid var(--line-cool);border-radius:8px}
  .modal-foot{display:flex;flex-wrap:wrap;gap:5px 16px;margin-top:12px;font-family:var(--mono);
    font-size:12px;color:var(--muted)}
  .modal-foot b{color:var(--text)}
  .mf.up{color:var(--good)}
  .mf.down{color:var(--bad)}
  .mf.dim{color:var(--faint)}
  .sugg{padding:11px 16px 16px;border-top:1px solid var(--line-cool)}
  .sugg .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{background:rgba(111,162,206,.08);border:1px solid var(--line-cool);border-radius:20px;
    padding:4px 10px;font-family:var(--mono);font-size:11.5px;color:var(--text);
    display:inline-flex;align-items:center;gap:5px;transition:.14s}
  .chip:hover{border-color:var(--accent-2);background:rgba(111,162,206,.16)}
  .chip .plus{color:var(--accent);font-weight:700}
  .chip.added{opacity:.4;text-decoration:line-through;pointer-events:none}
  .addco{width:100%;background:none;border:1px dashed var(--line);color:var(--muted);
    border-radius:8px;padding:9px;font-size:12.5px;margin-top:8px;transition:.14s}
  .addco:hover{color:var(--accent);border-color:var(--accent)}
  .form{padding:12px;background:var(--ground);border:1px solid var(--line);border-radius:8px;margin:10px 0}
  .form .row{display:flex;gap:8px;margin-bottom:8px}
  .form label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:3px}
  .form input,.form textarea,.form select{width:100%;background:var(--surface);border:1px solid var(--line-cool);
    color:var(--text);border-radius:6px;padding:7px 9px;font-size:13px;outline:none}
  .form input:focus,.form textarea:focus,.form select:focus{border-color:var(--accent-2)}
  .form .tkr-in{font-family:var(--mono);text-transform:uppercase}
  .form textarea{resize:vertical;min-height:48px;font-family:inherit}
  .form .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
  .conv-pick{display:flex;gap:6px;align-items:center}
  .conv-pick button{background:var(--surface);border:1px solid var(--line-cool);color:var(--muted);
    border-radius:6px;padding:6px 12px;font-family:var(--mono);font-size:13px}
  .conv-pick button.sel{border-color:var(--accent);color:var(--accent);background:rgba(233,165,60,.08)}
  .add-sector{border:1px dashed var(--line-cool);background:rgba(255,255,255,.015);

<script>
const KEY="sektor-masasi-v1";
const FS_OK = !!(window.showOpenFilePicker && window.showSaveFilePicker);
const IN_FRAME = window.top !== window.self;

const SEED=[
  {name:"Veri Merkezi Enerjisi & Güç", thesis:"AI veri merkezlerinin patlayan elektrik talebini karşılayanlar: yakıt hücresi, güç dağıtımı, bağımsız üreticiler ve şebeke ekipmanı.",
   suggestions:[["BE","Bloom Energy"],["VRT","Vertiv"],["TLN","Talen Energy"],["POWL","Powell Industries"],["BWXT","BWX Technologies"],["GEV","GE Vernova"]]},
  {name:"Yarı İletken & Çip (Small/Mid)", thesis:"Mega-cap dışı çip oyuncuları: bağlantı/connectivity, güç yarı iletkenleri, test ekipmanı ve foto-maske tedarikçileri.",
   suggestions:[["CRDO","Credo Technology"],["ALAB","Astera Labs"],["SITM","SiTime"],["AEHR","Aehr Test Systems"],["NVTS","Navitas"],["POWI","Power Integrations"],["PLAB","Photronics"],["ONTO","Onto Innovation"],["INDI","indie Semiconductor"]]},
  {name:"Savunma Sanayi & Savunma Teknolojisi", thesis:"İHA/drone, otonom sistemler, taktiksel iletişim ve niş savunma tedarikçileri — bütçe artışından beslenenler.",
   suggestions:[["KTOS","Kratos Defense"],["AVAV","AeroVironment"],["DRS","Leonardo DRS"],["MRCY","Mercury Systems"],["RCAT","Red Cat"],["ONDS","Ondas Holdings"],["BYRN","Byrna"],["KRMN","Karman Holdings"]]},
  {name:"Blockchain & Kripto Altyapısı", thesis:"Madencilik kapasitesini AI/HPC'ye çeviren bitcoin madencileri ve kripto altyapı oyuncuları.",
   suggestions:[["WULF","TeraWulf"],["IREN","Iris Energy"],["CIFR","Cipher Mining"],["CORZ","Core Scientific"],["BTDR","Bitdeer"],["CLSK","CleanSpark"],["HUT","Hut 8"],["GLXY","Galaxy Digital"]]},
  {name:"Nükleer & SMR / Uranyum", thesis:"Küçük modüler reaktörler (SMR) ve veri merkezi enerjisi için uranyum tedarik zinciri.",
   suggestions:[["OKLO","Oklo"],["SMR","NuScale Power"],["NNE","Nano Nuclear Energy"],["LEU","Centrus Energy"],["UEC","Uranium Energy"],["DNN","Denison Mines"],["NXE","NexGen Energy"]]},
  {name:"Yapay Zeka Altyapısı (Optik & Ağ)", thesis:"Veri merkezi içi/arası bağlantı: optik bileşenler, ağ donanımı ve neo-cloud GPU kiralama.",
   suggestions:[["COHR","Coherent"],["LITE","Lumentum"],["FN","Fabrinet"],["APLD","Applied Digital"],["INOD","Innodata"],["CRDO","Credo Technology"]]},
  {name:"Uzay & Uydu", thesis:"Fırlatma, uydu üretimi ve uzaydan doğrudan-cihaza (direct-to-cell) bağlantı oyuncuları.",
   suggestions:[["RKLB","Rocket Lab"],["ASTS","AST SpaceMobile"],["LUNR","Intuitive Machines"],["RDW","Redwire"],["PL","Planet Labs"]]},
  {name:"Siber Güvenlik (Small/Mid)", thesis:"Mega-cap dışı büyüyen güvenlik yazılımı: endpoint, veri koruma ve exposure management.",
   suggestions:[["S","SentinelOne"],["TENB","Tenable"],["RPD","Rapid7"],["VRNS","Varonis"],["RBRK","Rubrik"],["QLYS","Qualys"]]},
  {name:"Kuantum & Yeni Hesaplama (Spekülatif)", thesis:"Erken aşama kuantum donanım/yazılım — yüksek risk, yüksek büyüme opsiyonu. Küçük pozisyon mantığı.",
   suggestions:[["IONQ","IonQ"],["RGTI","Rigetti Computing"],["QBTS","D-Wave Quantum"],["QUBT","Quantum Computing"]]},
];

let state=loadLocal();
let ui={openForm:null, sectorFilter:new Set(), starView:null}; // starView: ortak takip listesi görünümü açık mı
let fileHandle=null, pendingHandle=null, lastMod=0, writeTimer=null, pollTimer=null;
let priceHandle=null, pendingPriceHandle=null, priceData=null, priceLastMod=0, pricePoll=null;

/* ---------- helpers ---------- */
function uid(){return "x"+(state.seq=(state.seq||0)+1).toString(36)+Math.abs((performance.now()*1000)|0).toString(36)}
function seed(){let s={seq:0,sectors:[]};SEED.forEach(x=>s.sectors.push({id:"s"+(s.seq++),name:x.name,thesis:x.thesis,suggestions:x.suggestions.map(p=>({t:p[0],n:p[1]})),companies:[]}));return s;}
function loadLocal(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return seed();}
function saveLocal(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function flash(msg){const f=document.getElementById("flash");f.textContent=msg;f.classList.add("show");clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove("show"),2400);}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- IndexedDB (handle persistence) ---------- */
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open("sm-db",1);r.onupgradeneeded=()=>r.result.createObjectStore("kv");r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbSet(k,v){try{const db=await idb();await new Promise((res,rej)=>{const tx=db.transaction("kv","readwrite");tx.objectStore("kv").put(v,k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}catch(e){}}
async function idbGet(k){try{const db=await idb();return await new Promise((res,rej)=>{const tx=db.transaction("kv","readonly");const q=tx.objectStore("kv").get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}catch(e){return null;}}

/* ---------- file sync ---------- */
async function ensurePerm(h,write){const o={mode:write?"readwrite":"read"};if((await h.queryPermission(o))==="granted")return true;return (await h.requestPermission(o))==="granted";}
async function loadFromFile(){
  const f=await fileHandle.getFile();lastMod=f.lastModified;
  const t=(await f.text()).trim();
  if(t){const d=JSON.parse(t);if(d&&d.sectors){state=d;saveLocal();return;}}
  state=seed();await writeNow(); // empty/new file → seed it
}
async function writeNow(){
  if(!fileHandle)return;
  const w=await fileHandle.createWritable();
  await w.write(JSON.stringify(state,null,2));await w.close();
  try{const f=await fileHandle.getFile();lastMod=f.lastModified;}catch(e){}
}
/* ================= GitHub canlı senkron ================= */
const GH={user:"laraarin",repo:"sektor-masasi",branch:"main",dataFile:"sektor-masasi-veri.json",priceFile:"piyasa-verileri.json",newsFile:"haberler.json",regimeFile:"rejim.json"};
let ghToken=localStorage.getItem("sm-gh-token")||"";
let dataSha=null, priceCommit=null, newsCommit=null, ghWriteTimer=null, ghPollTimer=null, ghBusy=false;
let newsData=null;  // haberler.json (salt-okunur, Actions üretir)
let regimeData=null, regimeCommit=null;  // rejim.json (Risk İştahı rejim bantları, Actions üretir)
function ghReady(){return !!ghToken;}
function ghHeaders(extra){return Object.assign({Authorization:"Bearer "+ghToken,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"},extra||{});}
function b64encUtf8(s){const b=new TextEncoder().encode(s);let bin="";for(let i=0;i<b.length;i++)bin+=String.fromCharCode(b[i]);return btoa(bin);}
function b64decUtf8(b){const bin=atob((b||"").replace(/\s/g,""));const u=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder().decode(u);}
function ghApi(path,opts){return fetch("https://api.github.com/repos/"+GH.user+"/"+GH.repo+path,opts);}
async function ghLoadData(){
  const r=await ghApi("/contents/"+GH.dataFile+"?ref="+GH.branch+"&_="+Date.now(),{headers:ghHeaders(),cache:"no-store"});
  if(r.status===404){dataSha=null;return;}
  if(r.status===401)throw new Error("Token geçersiz (401)");
  if(!r.ok)throw new Error("Veri okunamadı ("+r.status+")");
  const j=await r.json();dataSha=j.sha;
  const txt=b64decUtf8(j.content);
  if(txt.trim()){const d=JSON.parse(txt);if(d&&d.sectors){state=d;saveLocal();}}
}
async function ghLoadPrice(){
  const r=await ghApi("/contents/"+GH.priceFile+"?ref="+GH.branch+"&_="+Date.now(),{headers:ghHeaders({Accept:"application/vnd.github.raw"}),cache:"no-store"});
  if(!r.ok)return;
  const txt=await r.text();
  if(txt.trim()){const d=JSON.parse(txt);if(d&&d.quotes){priceData=d;let lbl="yüklendi";if(d.updated){try{lbl=new Date(d.updated).toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){}}priceData.updatedLabel=lbl;}}
  priceCommit=await ghLatestCommit(GH.priceFile);
}
async function ghLoadNews(){
  const r=await ghApi("/contents/"+GH.newsFile+"?ref="+GH.branch+"&_="+Date.now(),{headers:ghHeaders({Accept:"application/vnd.github.raw"}),cache:"no-store"});
  if(!r.ok)return;
  const txt=await r.text();
  if(txt.trim()){const d=JSON.parse(txt);if(d&&d.news)newsData=d;}
  newsCommit=await ghLatestCommit(GH.newsFile);
}
async function ghLoadRegime(){
  const r=await ghApi("/contents/"+GH.regimeFile+"?ref="+GH.branch+"&_="+Date.now(),{headers:ghHeaders({Accept:"application/vnd.github.raw"}),cache:"no-store"});
  if(!r.ok)return;
  const txt=await r.text();
  if(txt.trim()){const d=JSON.parse(txt);if(d&&d.segments)regimeData=d;}
  regimeCommit=await ghLatestCommit(GH.regimeFile);
}
async function ghLatestCommit(path){try{const r=await ghApi("/commits?path="+encodeURIComponent(path)+"&sha="+GH.branch+"&per_page=1&_="+Date.now(),{headers:ghHeaders(),cache:"no-store"});if(!r.ok)return null;const a=await r.json();return (a&&a[0])?a[0].sha:null;}catch(e){return null;}}
async function ghSaveData(){
  if(!ghReady())return;
  const mk=()=>({message:"pano güncelleme",content:b64encUtf8(JSON.stringify(state,null,2)),branch:GH.branch,sha:dataSha||undefined});
  let r=await ghApi("/contents/"+GH.dataFile,{method:"PUT",headers:ghHeaders(),body:JSON.stringify(mk())});
  if(r.status===409||r.status===422){await ghLoadData();r=await ghApi("/contents/"+GH.dataFile,{method:"PUT",headers:ghHeaders(),body:JSON.stringify(mk())});}
  if(!r.ok){flash("GitHub'a yazılamadı ("+r.status+")");return;}
  const j=await r.json();if(j.content&&j.content.sha)dataSha=j.content.sha;
}
function scheduleWrite(){ saveLocal(); if(!ghReady())return; clearTimeout(ghWriteTimer); ghWriteTimer=setTimeout(()=>ghSaveData().catch(e=>flash("Yazma hatası: "+e.message)),700); }
function startGitPoll(){
  if(ghPollTimer)clearInterval(ghPollTimer);
  ghPollTimer=setInterval(async()=>{
    if(!ghReady()||ui.openForm||ghBusy)return;
    ghBusy=true;
    try{
      const r=await ghApi("/contents/"+GH.dataFile+"?ref="+GH.branch+"&_="+Date.now(),{headers:ghHeaders(),cache:"no-store"});
      if(r.ok){const j=await r.json();if(j.sha!==dataSha){dataSha=j.sha;const txt=b64decUtf8(j.content);const d=JSON.parse(txt);if(d&&d.sectors){state=d;saveLocal();render(true);flash("Ortak veri güncellendi");}}}
      const pc=await ghLatestCommit(GH.priceFile);
      if(pc&&pc!==priceCommit){await ghLoadPrice();render(true);flash("Piyasa verisi güncellendi");}
      const nc=await ghLatestCommit(GH.newsFile);
      if(nc&&nc!==newsCommit){await ghLoadNews();render(true);flash("Haberler güncellendi");}
      const rc=await ghLatestCommit(GH.regimeFile);
      if(rc&&rc!==regimeCommit){await ghLoadRegime();render(true);flash("Risk rejimi güncellendi");}
    }catch(e){}finally{ghBusy=false;}
  },25000);
}
function setToken(){
  const t=prompt("GitHub fine-grained token'ını yapıştır (github_pat_...).\nSadece bu tarayıcıda saklanır:", "");
  if(t===null)return;
  ghToken=t.trim();
  if(ghToken)localStorage.setItem("sm-gh-token",ghToken);else localStorage.removeItem("sm-gh-token");
  if(!ghToken){renderSrcBar();return;}
  flash("Bağlanılıyor…");
  (async()=>{try{await ghLoadData();await ghLoadPrice();await ghLoadNews();await ghLoadRegime();startGitPoll();render(true);flash("GitHub'a bağlandı");}catch(e){flash("Hata: "+e.message);renderSrcBar();}})();
}
function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(!fileHandle||ui.openForm)return;            // don't disturb active editing
    try{
      const f=await fileHandle.getFile();
      if(f.lastModified>lastMod){
        const t=(await f.text()).trim();
        if(t){const d=JSON.parse(t);if(d&&d.sectors){state=d;lastMod=f.lastModified;saveLocal();render(true);flash("Ortak veri güncellendi");}}
      }
    }catch(e){}
  },5000);
}

async function connectExisting(){
  try{
    const [h]=await window.showOpenFilePicker({types:[{description:"Sektör Masası verisi",accept:{"application/json":[".json"]}}]});
    if(!await ensurePerm(h,true)){flash("İzin verilmedi");return;}
    fileHandle=h;await loadFromFile();await idbSet("fileHandle",h);pendingHandle=null;
    startPolling();render(true);flash("Ortak dosyaya bağlanıldı");
  }catch(e){if(e&&e.name!=="AbortError")flash("Bağlanılamadı: "+e.message);}
}
async function createNew(){
  try{
    const h=await window.showSaveFilePicker({suggestedName:"sektor-masasi-veri.json",types:[{description:"Sektör Masası verisi",accept:{"application/json":[".json"]}}]});
    if(!await ensurePerm(h,true)){flash("İzin verilmedi");return;}
    fileHandle=h;state=seed();await writeNow();await idbSet("fileHandle",h);pendingHandle=null;
    startPolling();render(true);flash("Yeni ortak dosya oluşturuldu");
  }catch(e){if(e&&e.name!=="AbortError")flash("Oluşturulamadı: "+e.message);}
}
async function reconnect(){
  if(!pendingHandle)return;
  if(!await ensurePerm(pendingHandle,true)){flash("İzin verilmedi");return;}
  fileHandle=pendingHandle;pendingHandle=null;
  await loadFromFile();startPolling();render(true);flash("Yeniden bağlanıldı");
}
async function refreshNow(){
  if(!fileHandle)return;
  try{await loadFromFile();render(true);flash("Yenilendi");}catch(e){flash("Okunamadı: "+e.message);}
}
async function disconnect(){
  fileHandle=null;pendingHandle=null;if(pollTimer)clearInterval(pollTimer);

function fmtMC(v){if(!v)return "";const a=Math.abs(v);if(a>=1e12)return "$"+(v/1e12).toFixed(2)+"T";if(a>=1e9)return "$"+(v/1e9).toFixed(1)+"B";if(a>=1e6)return "$"+(v/1e6).toFixed(0)+"M";return "$"+Math.round(v);}
async function readPriceFile(){
  const f=await priceHandle.getFile();priceLastMod=f.lastModified;
  const t=(await f.text()).trim();
  if(t){const d=JSON.parse(t);priceData=(d&&d.quotes)?d:{quotes:{}};
    let lbl="yüklendi";
    if(priceData.updated){try{lbl=new Date(priceData.updated).toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){}}
    priceData.updatedLabel=lbl;
  }else{priceData={quotes:{}};}
}
async function connectPrices(){
  try{
    const [h]=await window.showOpenFilePicker({types:[{description:"Piyasa verisi",accept:{"application/json":[".json"]}}]});
    if((await h.queryPermission({mode:"read"}))!=="granted" && (await h.requestPermission({mode:"read"}))!=="granted"){flash("İzin verilmedi");return;}

/* ---------- fiyat grafikleri (Canvas) ---------- */
const C_GOOD="#7FB069", C_BAD="#D2654E";
const RANGES=[["1A",21],["3A",63],["6A",126],["1Y",252]];
let chartState={ticker:null,range:"6A"};
let inlineRange={}; // ticker -> satır içi grafik aralığı

/* ---------- sektör içi sıralama (yalnızca görünüm; veriye yazmaz) ---------- */
let sortPref={};
try{sortPref=JSON.parse(localStorage.getItem("sm-sort")||"{}")||{};}catch(e){sortPref={};}
function saveSort(){try{localStorage.setItem("sm-sort",JSON.stringify(sortPref));}catch(e){}}
const SORT_KEYS=[["manual","Manuel"],["mcap","Piyasa Değeri"],["pe","F/K"],["epsG","EPS Büyüme"],["chg","Değişim %"],["upside","Upside"]];
function sortDefaultDir(k){return k==="pe"?"asc":"desc";} // F/K'da düşük=ucuz; diğerlerinde yüksek önce
function quoteOf(t){return (priceData&&priceData.quotes)?priceData.quotes[(t||"").toUpperCase()]:null;}
function sortVal(c,key){
  const q=quoteOf(c.ticker);if(!q)return null;
  const v={mcap:q.marketCap,pe:q.pe,epsG:q.epsG,chg:q.changePct,upside:q.upside}[key];
  return (v==null||(typeof v==="number"&&isNaN(v)))?null:v;
}
function sortedCompanies(sec){
  const p=sortPref[sec.id];
  if(!p||p.key==="manual")return sec.companies;          // dokunulmamış sıra
  const dir=p.dir==="asc"?1:-1;
  return sec.companies.slice().sort((a,b)=>{              // .slice() → veriyi yerinde değiştirmez
    const va=sortVal(a,p.key),vb=sortVal(b,p.key);
    if(va==null&&vb==null)return 0;
    if(va==null)return 1;                                 // verisi olmayan en alta
    if(vb==null)return -1;
    return (va-vb)*dir;
  });
}
function median(a){const s=[...a].sort((x,y)=>x-y);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}
function hexA(h,a){const n=parseInt(h.slice(1),16);return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";}
function histOf(t){const q=(priceData&&priceData.quotes)?priceData.quotes[(t||"").toUpperCase()]:null;return (q&&q.hist&&q.hist.c&&q.hist.c.length>1)?q.hist:null;}
/* ---------- Risk İştahı rejim bantları (rejim.json) ---------- */
// 's': 0 Risk-On (yeşil) · 1 Nötr (amber) · 2 Risk-Off (kırmızı)
const REGIME_COL=["#2E8B57","#E8A33D","#C0392B"];
// Bir tarihin rejimi: o tarihten küçük-eşit son segmentin değeri.
function regimeAt(dateStr){
  if(!regimeData||!regimeData.segments||!regimeData.segments.length)return null;
  const segs=regimeData.segments;let s=null;
  for(let i=0;i<segs.length;i++){if(segs[i].d<=dateStr)s=segs[i].s;else break;}
  return s;
}
// Ardışık aynı rejim günlerini tek dikey bant olarak doldur (çizginin arkasına).
function drawRegimeBands(ctx,dates,X,top,bottom){
  if(!regimeData||!dates||!dates.length)return;
  let runStart=0,runState=regimeAt(dates[0]);
  for(let i=1;i<=dates.length;i++){
    const st=i<dates.length?regimeAt(dates[i]):null;
    if(i===dates.length||st!==runState){
      if(runState!=null){
        const x0=X(runStart),x1=X(Math.min(i,dates.length-1));
        ctx.fillStyle=hexA(REGIME_COL[runState],.13);
        ctx.fillRect(x0,top,(x1-x0)||1,bottom-top);
      }
      runStart=i;runState=st;
    }
  }
}
function drawSeries(cv,closes,opts){
  opts=opts||{};const ctx=cv.getContext("2d");const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  if(!closes||closes.length<2)return;
  const pad0=opts.pad||0;
  if(opts.dates&&opts.dates.length===closes.length)
    drawRegimeBands(ctx,opts.dates,i=>pad0+(i/(closes.length-1))*(W-2*pad0),0,H);
  const pad=opts.pad||0;
  const mn=Math.min(...closes),mx=Math.max(...closes),rng=(mx-mn)||1,n=closes.length;
  const X=i=>pad+(i/(n-1))*(W-2*pad);
  const Y=v=>pad+(1-(v-mn)/rng)*(H-2*pad);
  const up=closes[n-1]>=closes[0];
  const col=opts.color||(up?C_GOOD:C_BAD);
  if(opts.fill){
    ctx.beginPath();ctx.moveTo(X(0),H-pad);
    for(let i=0;i<n;i++)ctx.lineTo(X(i),Y(closes[i]));
    ctx.lineTo(X(n-1),H-pad);ctx.closePath();
    const g=ctx.createLinearGradient(0,pad,0,H);g.addColorStop(0,hexA(col,.20));g.addColorStop(1,hexA(col,0));
    ctx.fillStyle=g;ctx.fill();
  }
  ctx.beginPath();
  for(let i=0;i<n;i++){const x=X(i),y=Y(closes[i]);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
  ctx.lineWidth=opts.lw||1.4;ctx.strokeStyle=col;ctx.lineJoin="round";ctx.lineCap="round";ctx.stroke();
  if(opts.dot){ctx.fillStyle=col;ctx.beginPath();ctx.arc(X(n-1),Y(closes[n-1]),3,0,Math.PI*2);ctx.fill();}
}
// Eksenli (tarih/fiyat) satır-içi grafik
function drawAxisChart(cv,hist,range){
  const ctx=cv.getContext("2d");const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  if(!hist||!hist.c)return;
  const rn=(RANGES.find(r=>r[0]===range)||RANGES[3])[1];
  const closes=hist.c.slice(-rn),dates=hist.d.slice(-rn),n=closes.length;
  if(n<2)return;
  const padL=46,padR=8,padT=8,padB=20;
  const mn=Math.min(...closes),mx=Math.max(...closes),rng=(mx-mn)||1;
  const X=i=>padL+(i/(n-1))*(W-padL-padR);
  const Y=v=>padT+(1-(v-mn)/rng)*(H-padT-padB);
  const up=closes[n-1]>=closes[0],col=up?C_GOOD:C_BAD;
  ctx.font="9px ui-monospace,Consolas,monospace";
  // Rejim bantları (her şeyin arkasında)
  drawRegimeBands(ctx,dates,X,padT,H-padB);
  // Y ekseni: yatay çizgiler + fiyat seviyeleri
  ctx.textBaseline="middle";ctx.textAlign="right";
  const yl=4;
  for(let k=0;k<=yl;k++){
    const v=mn+rng*k/yl,y=Y(v);
    ctx.strokeStyle="rgba(255,255,255,.05)";ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
    ctx.fillStyle="#6b7480";ctx.fillText("$"+(v>=100?v.toFixed(0):v.toFixed(1)),padL-5,y);
  }
  // alan dolgusu
  ctx.beginPath();ctx.moveTo(X(0),H-padB);
  for(let i=0;i<n;i++)ctx.lineTo(X(i),Y(closes[i]));
  ctx.lineTo(X(n-1),H-padB);ctx.closePath();
  const g=ctx.createLinearGradient(0,padT,0,H-padB);g.addColorStop(0,hexA(col,.20));g.addColorStop(1,hexA(col,0));
  ctx.fillStyle=g;ctx.fill();
  // çizgi
  ctx.beginPath();for(let i=0;i<n;i++){const x=X(i),y=Y(closes[i]);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
  ctx.lineWidth=1.6;ctx.strokeStyle=col;ctx.lineJoin="round";ctx.stroke();
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(X(n-1),Y(closes[n-1]),2.5,0,Math.PI*2);ctx.fill();
  // X ekseni: tarihler (baş / orta / son)
  ctx.fillStyle="#6b7480";ctx.textBaseline="alphabetic";
  const idxs=[0,Math.floor((n-1)/2),n-1],al=["left","center","right"];
  idxs.forEach((idx,j)=>{const d=dates[idx]||"";const lbl=d.slice(8,10)+"."+d.slice(5,7);ctx.textAlign=al[j];
    ctx.fillText(lbl,Math.min(Math.max(X(idx),padL),W-padR),H-6);});
}

/* ---------- Sektör Rotasyonu (haftalık/aylık ayrışma + 252g doygunluk; yalnızca görünüm) ---------- */
let rotationWin=localStorage.getItem("sm-rotwin")||"1A";
let rotationOpen=localStorage.getItem("sm-rotopen")!=="0";
let rotBase=localStorage.getItem("sm-rotbase")||"mutlak";   // kıyas: mutlak | evren | SPY | QQQ | IWM
const ROT_WINDOWS=[["1H",5],["1A",21]]; // işlem günü: ~1 hafta / ~1 ay
const BENCHES=["SPY","QQQ","IWM"];
function winReturn(closes,n){
  if(!closes||closes.length<n+1)return null;
  const last=closes[closes.length-1],prev=closes[closes.length-1-n];
  if(!prev||isNaN(last)||isNaN(prev))return null;
  return (last/prev-1)*100;
}
// 252g doygunluk: hissenin kendi son ~1 yıllık fiyat aralığındaki z konumu, zaman
// serisi olarak. Sektör genelinde ortalanıp kart başlığındaki mini grafiği besler.
// Yüksek (+) = aralığın tepesinde/doygun, düşük (−) = dipte.
function stockZSeries(closes){
  if(!closes||closes.length<60)return null;   // anlamlı z için en az ~3 ay
  const s=closes.slice(-252);
  const m=s.reduce((a,b)=>a+b,0)/s.length;
  let v=0;for(let i=0;i<s.length;i++)v+=(s[i]-m)*(s[i]-m);
  const sd=Math.sqrt(v/s.length);
  return sd?s.map(x=>(x-m)/sd):null;
}
function sectorZSeries(sec){
  const sers=[];let longest=null,longestLen=0;
  sec.companies.forEach(c=>{const q=quoteOf(c.ticker);if(q&&q.hist&&q.hist.c){const z=stockZSeries(q.hist.c);if(z){sers.push(z);if(z.length>longestLen){longestLen=z.length;longest=q.hist;}}}});
  if(!sers.length)return null;
  const maxLen=Math.max(...sers.map(a=>a.length));
  const out=[];
  for(let p=0;p<maxLen;p++){let sum=0,cnt=0;for(const a of sers){const i=a.length-1-p;if(i>=0){sum+=a[i];cnt++;}}if(cnt)out.push(sum/cnt);}
  out.reverse(); // kronolojik
  const dates=(longest&&longest.d)?longest.d.slice(-out.length):null; // en uzun geçmişli üyenin tarihleri
  return {z:out,dates};
}
// Eksenli (y: σ seviyeleri, x: tarih) doygunluk grafiği — kart başlığında sağda.
function drawZAxis(cv,z,dates){
  const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;ctx.clearRect(0,0,W,H);
  if(!z||z.length<2)return;
  const padL=34,padR=10,padT=10,padB=18;
  let mn=Math.min(0,...z),mx=Math.max(0,...z);const m=(mx-mn)*0.08||0.5;mn-=m;mx+=m;
  const rng=(mx-mn)||1,n=z.length;
  const X=i=>padL+(i/(n-1))*(W-padL-padR),Y=v=>padT+(1-(v-mn)/rng)*(H-padT-padB);
  ctx.font="9px ui-monospace,Consolas,monospace";
  // y ekseni: tam sayı σ seviyeleri, z=0 vurgulu
  ctx.textBaseline="middle";ctx.textAlign="right";
  for(let k=Math.ceil(mn);k<=Math.floor(mx);k++){
    const y=Y(k);
    ctx.strokeStyle=k===0?"rgba(255,255,255,.22)":"rgba(255,255,255,.06)";ctx.lineWidth=k===0?1.2:1;
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
    ctx.fillStyle=k===0?"#8B93A0":"#6b7480";ctx.fillText((k>0?"+":"")+k+"σ",padL-4,y);
  }
  // alan dolgusu (z=0 çizgisine kadar) + çizgi
  const last=z[n-1],col=last>=1?"#E9A53C":(last<=-1?"#6FA2CE":"#8B93A0");
  ctx.save();ctx.beginPath();ctx.moveTo(X(0),Y(0));
  for(let i=0;i<n;i++)ctx.lineTo(X(i),Y(z[i]));
  ctx.lineTo(X(n-1),Y(0));ctx.closePath();
  const g=ctx.createLinearGradient(0,padT,0,H-padB);g.addColorStop(0,"rgba(233,165,60,.10)");g.addColorStop(1,"rgba(111,162,206,.10)");
  ctx.fillStyle=g;ctx.fill();ctx.restore();
  ctx.beginPath();for(let i=0;i<n;i++){const x=X(i),y=Y(z[i]);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
  ctx.lineWidth=1.7;ctx.strokeStyle=col;ctx.lineJoin="round";ctx.stroke();
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(X(n-1),Y(last),2.6,0,Math.PI*2);ctx.fill();
  // x ekseni: tarihler (baş / orta / son) — AY/YY
  if(dates&&dates.length===n){
    ctx.fillStyle="#6b7480";ctx.textBaseline="alphabetic";
    const idxs=[0,Math.floor((n-1)/2),n-1],al=["left","center","right"];
    idxs.forEach((idx,j)=>{const d=dates[idx]||"";const lbl=d.slice(5,7)+"/"+d.slice(2,4);ctx.textAlign=al[j];ctx.fillText(lbl,Math.min(Math.max(X(idx),padL),W-padR),H-5);});
  }
}
function benchReturns(days){const o={};BENCHES.forEach(b=>{const q=quoteOf(b);o[b]=(q&&q.hist&&q.hist.c)?winReturn(q.hist.c,days):null;});return o;}
function sectorRotation(days){
  const rows=state.sectors.map(sec=>{
    const rets=[];
    sec.companies.forEach(c=>{const q=quoteOf(c.ticker);if(q&&q.hist&&q.hist.c){const r=winReturn(q.hist.c,days);if(r!=null)rets.push(r);}});
    if(!rets.length)return {sec,n:0,ret:null};
    const mean=rets.reduce((a,b)=>a+b,0)/rets.length;        // eşit ağırlık getiri
    const up=rets.filter(r=>r>0).length;
    return {sec,n:rets.length,ret:mean,breadth:Math.round(up/rets.length*100)};
  });
  const valid=rows.filter(r=>r.ret!=null);
  const uni=valid.length?valid.reduce((a,b)=>a+b.ret,0)/valid.length:0;  // kendi evren ortalaman
  const isBench=(rotBase!=="mutlak"&&rotBase!=="evren");
  let benchRet=null;
  if(isBench){const bq=quoteOf(rotBase);benchRet=(bq&&bq.hist&&bq.hist.c)?winReturn(bq.hist.c,days):null;}
  const baseMissing=isBench&&benchRet==null;
  let baseline=0;                                       // Mutlak: kıyas yok (taban 0)
  if(rotBase==="evren"||baseMissing)baseline=uni;       // Evren ort. (bench eksikse de buna düş)
  else if(isBench)baseline=benchRet;                    // SPY/QQQ/IWM getirisi
  valid.forEach(r=>{r.rel=r.ret-baseline;});            // bar bu değere göre (Mutlak'ta = mutlak getiri)
  return {rows,uni,baseline,benchRet,baseMissing};
}
function renderRotation(){
  const el=document.getElementById("rotation");if(!el)return;
  if(!priceData||!priceData.quotes){el.innerHTML="";return;}             // fiyat verisi yoksa gizle
  const days=(ROT_WINDOWS.find(w=>w[0]===rotationWin)||ROT_WINDOWS[1])[1];
  const R=sectorRotation(days);
  const valid=R.rows.filter(r=>r.ret!=null).sort((a,b)=>b.ret-a.ret);    // lider üstte
  const br=benchReturns(days);
  const BASES=[["mutlak","Mutlak"],["evren","Evren"],["SPY","SPY"],["QQQ","QQQ"],["IWM","IWM"]];
  const baseBtns=BASES.map(b=>`<button class="rotwin ${rotBase===b[0]?'on':''}" data-rb="${b[0]}" title="${b[0]==='mutlak'?'Kıyas yok — mutlak getiriye göre yeşil/kırmızı':(b[0]==='evren'?'Kendi takip evreninin ortalamasına göre':b[0]+' endeksine göre')}">${b[1]}</button>`).join("");
  const isCmp=rotBase!=="mutlak";
  const refTxt=BENCHES.filter(b=>br[b]!=null).map(b=>`${b} <b class="${br[b]>=0?'up':'down'}">${br[b]>=0?'+':''}${br[b].toFixed(1)}%</b>`).join(" · ")||"benchmark verisi yok";
  const head=`<div class="rot-head">
    <span class="rot-title">Sektör Rotasyonu</span>
    <span class="rot-win">${ROT_WINDOWS.map(w=>`<button class="rotwin ${rotationWin===w[0]?'on':''}" data-rw="${w[0]}">${w[0]==="1H"?"1 Hafta":"1 Ay"}</button>`).join("")}</span>
    <span class="rot-klabel">Kıyas</span><span class="rot-win">${baseBtns}</span>
    <span class="rot-ref">${refTxt}</span>
    <span class="rot-spacer"></span>
    <button class="rot-toggle">${rotationOpen?"gizle ▾":"göster ▸"}</button>
  </div>`;
  let bodyHtml="";
  if(rotationOpen){
    if(!valid.length){
      bodyHtml=`<div class="rot-empty">Rotasyon için hisse geçmişi yok — sektörlere hisse ekleyip fiyatları güncelle.</div>`;
    }else{
      const baseName=rotBase==="evren"?"evren ort.":rotBase;
      const colhead=`<div class="rot-row rot-colhead">
        <span class="rot-name">Sektör</span><div class="rot-track"></div>
        <span class="rot-ret">${rotationWin==="1H"?"1H":"1A"} getiri</span>
        ${isCmp?`<span class="rot-exc">vs ${esc(baseName)}</span>`:""}
        <span class="rot-meta">hisse</span>
      </div>`;
      const maxAbs=Math.max(0.01,...valid.map(r=>Math.abs(r.rel)));   // bar seçili kıyasa göre ölçeklenir
      const rowsHtml=valid.map(r=>{
        const bv=r.rel,pos=bv>=0,w=Math.abs(bv)/maxAbs*50;            // Mutlak'ta bv=mutlak getiri, kıyasta=fark
        const bar=pos?`left:50%;width:${w}%`:`left:${50-w}%;width:${w}%`;
        const rpos=r.ret>=0;
        const exc=isCmp?(R.baseMissing?`<span class="rot-exc dim">—</span>`:`<span class="rot-exc ${pos?'up':'down'}">${pos?'+':''}${r.rel.toFixed(1)}</span>`):"";
        return `<div class="rot-row">
          <span class="rot-name" title="${esc(r.sec.name)}">${esc(r.sec.name)}</span>
          <div class="rot-track"><div class="rot-mid"></div><div class="rot-bar ${pos?"pos":"neg"}" style="${bar}"></div></div>
          <span class="rot-ret ${rpos?"up":"down"}">${rpos?"+":""}${r.ret.toFixed(1)}%</span>
          ${exc}
          <span class="rot-meta" title="kaç hisse · artıda olan %">${r.n}h·${r.breadth}%↑</span>
        </div>`;
      }).join("");
      const miss=R.baseMissing?`<div class="rot-nodata">${esc(rotBase)} verisi henüz yok — şimdilik evren ortalamasına göre gösteriliyor.</div>`:"";
      const noData=R.rows.filter(r=>r.ret==null);
      const nd=noData.length?`<div class="rot-nodata">Veri yetersiz: ${noData.map(r=>esc(r.sec.name)).join(" · ")}</div>`:"";
      bodyHtml=colhead+`<div class="rot-list">`+rowsHtml+`</div>`+miss+nd;
    }
  }
  el.innerHTML=head+bodyHtml;
  el.querySelectorAll(".rotwin[data-rw]").forEach(b=>b.onclick=()=>{rotationWin=b.dataset.rw;localStorage.setItem("sm-rotwin",rotationWin);renderRotation();});
  el.querySelectorAll(".rotwin[data-rb]").forEach(b=>b.onclick=()=>{rotBase=b.dataset.rb;localStorage.setItem("sm-rotbase",rotBase);renderRotation();});
  const tg=el.querySelector(".rot-toggle");if(tg)tg.onclick=()=>{rotationOpen=!rotationOpen;localStorage.setItem("sm-rotopen",rotationOpen?"1":"0");renderRotation();};
}

function render(fromRemote){renderSrcBar();renderStats();renderRotation();renderFilter();renderTape();renderGrid();drawSparklines();wireEditForms();

function renderFilter(){
  const el=document.getElementById("filterbar");
  const sel=ui.sectorFilter;
  // stale id temizliği
  [...sel].forEach(id=>{if(!state.sectors.some(s=>s.id===id))sel.delete(id);});
  let html=`<span class="flabel">Göster</span>`;
  html+=`<button class="fchip star ${ui.starView?'on':''}" data-star="1" title="Ekibin ortak takip listesi">⭐ Yıldızlılar<span class="fc">${starCount()}</span></button>`;
  html+=`<button class="fchip ${(!ui.starView&&sel.size===0)?'on':''}" data-all="1">Tümü<span class="fc">${state.sectors.length}</span></button>`;
  html+=state.sectors.map(s=>`<button class="fchip ${(!ui.starView&&sel.has(s.id))?'on':''}" data-id="${s.id}">${esc(s.name)}<span class="fc">${s.companies.length}</span></button>`).join("");
  el.innerHTML=html;
  el.querySelectorAll('[data-star]').forEach(b=>b.onclick=()=>{ui.starView=ui.starView?null:true;ui.sectorFilter=new Set();render(true);});
  el.querySelector('[data-all]').onclick=()=>{ui.starView=null;ui.sectorFilter=new Set();render(true);};
  el.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.id;ui.starView=null;
    if(sel.has(id))sel.delete(id);else sel.add(id);
    render(true);
  });
}
function allCompanies(){return state.sectors.flatMap(s=>s.companies);}

/* ---------- Ortak takip listesi (yıldızlananlar — herkes ortak) ---------- */
function sharedStarsArr(){if(!state.sharedStars)state.sharedStars=[];return state.sharedStars;}
function isStarred(tk){tk=(tk||"").toUpperCase();return !!(state.sharedStars&&state.sharedStars.includes(tk));}
function starCount(){return (state.sharedStars||[]).length;}
function toggleStar(tk){
  tk=(tk||"").toUpperCase();const arr=sharedStarsArr();const i=arr.indexOf(tk);
  if(i>=0)arr.splice(i,1);else arr.push(tk);
  render();
  flash(i>=0?"Takipten çıkarıldı":"Takip listesine eklendi");
}

function renderGrid(){
  const q=(document.getElementById("search").value||"").trim().toUpperCase();
  const grid=document.getElementById("grid");grid.innerHTML="";
  let shown=0;
  const sv=ui.starView;
  state.sectors.forEach((sec,i)=>{
    if(sv){if(!sec.companies.some(c=>isStarred(c.ticker)))return;}
    else if(ui.sectorFilter.size && !ui.sectorFilter.has(sec.id))return;
    if(q){const hit=sec.name.toUpperCase().includes(q)||sec.companies.some(c=>(c.ticker+" "+(c.name||"")).toUpperCase().includes(q));if(!hit)return;}
    grid.appendChild(cardEl(sec,i));shown++;
  });
  if(sv){  // yıldız görünümü: tüm sektörlerden yalnızca işaretliler
    grid.style.gridTemplateColumns="";
    if(!shown){const e=document.createElement("div");e.className="empty-note";e.style.padding="22px 4px";
      e.textContent="Takip listesinde şirket yok — bir şirketin yanındaki ☆'a dokunarak ekle.";
      grid.appendChild(e);}
    return;
  }
  // Sektör filtresi aktifken kartları ekran genişliğine yay; Tümü'de normal düzen.
  if(ui.sectorFilter.size){
    grid.style.gridTemplateColumns=`repeat(${Math.min(shown||1,3)}, minmax(0,1fr))`;
  }else{
    grid.style.gridTemplateColumns="";
    const add=document.createElement("button");add.className="add-sector";
    add.innerHTML='<span class="big">+</span><span>Yeni sektör ekle</span>';add.onclick=addSector;grid.appendChild(add);
  }
}

      <div class="card-actions">

function coRow(sec,c){
  if(ui.openForm&&ui.openForm.sectorId===sec.id&&ui.openForm.companyId===c.id)return `<div class="co-edit-host" data-id="${c.id}">${formEl(sec,c,null)}</div>`;
  const dots=[1,2,3].map(n=>`<span class="dot ${c.conv>=n?'on':''}"></span>`).join("");
  const q=(priceData&&priceData.quotes)?priceData.quotes[c.ticker.toUpperCase()]:null;
  const hasHist=!!(q&&q.hist&&q.hist.c&&q.hist.c.length>1);
  const focused=ui.sectorFilter.size>0;
  const tkrCls="tkr"+(hasHist?" live":"");
  const tkrAttr=hasHist?` data-chart="${esc(c.ticker)}"`:"";
  const spark=(ui.sectorFilter.size>=2&&hasHist)?`<canvas class="spark" data-spark="${esc(c.ticker)}" data-chart="${esc(c.ticker)}" width="150" height="36"></canvas>`:"";
  const band=(q&&q.size)?q.size:c.size;
  const sizeTag=band?`<span class="size-tag">${esc(band)}</span>`:"";
  const mcTag=(q&&q.marketCap)?`<span class="mc-tag" title="Piyasa değeri">${fmtMC(q.marketCap)}</span>`:"";
  const ncnt=newsCountFor(c.ticker);
  const nb=ncnt?`<span class="news-badge" data-news="${esc(c.ticker)}" title="${ncnt} haber — aç">📰 ${ncnt}</span>`:"";
  const sS=isStarred(c.ticker);
  const starBtns=`<button class="iconbtn star ${sS?'on':''}" data-star="1" data-tk="${esc(c.ticker)}" title="${sS?'Takipten çıkar':'Takip listesine ekle'}">${sS?'★':'☆'}</button>`;
  let px="";
  if(q&&q.price!=null){
    const chg=q.changePct;
    const cls=chg>0?"up":(chg<0?"down":"");
    const chgTxt=(chg!=null)?` <span class="chg ${cls}">${chg>0?"+":""}${chg.toFixed(2)}%</span>`:"";
    px=`<span class="px">$${Number(q.price).toFixed(2)}${chgTxt}</span>`;
  }
  let metrics="";
  if(q){
    const p=[];
    if(q.pe!=null)p.push(`<span class="m">F/K <b>${q.pe.toFixed(1)}</b></span>`);
    if(q.fwdPe!=null)p.push(`<span class="m">İleri F/K <b>${q.fwdPe.toFixed(1)}</b></span>`);
    if(q.ebitda!=null)p.push(`<span class="m">EBITDA <b>${fmtMC(q.ebitda)}</b></span>`);
    if(q.epsG!=null){const c2=q.epsG>0?"up":(q.epsG<0?"down":"");p.push(`<span class="m">EPS büy. <b class="${c2}">${q.epsG>0?"+":""}${q.epsG.toFixed(0)}%</b></span>`);}
    if(q.target!=null){const up=q.upside;const c3=(up>0)?"up":(up<0?"down":"");const ut=(up!=null)?` <span class="chg ${c3}">${up>0?"+":""}${up.toFixed(0)}%</span>`:"";p.push(`<span class="m">Hedef <b>$${q.target.toFixed(2)}</b>${ut}</span>`);}
    if(q.analysts)p.push(`<span class="m" title="${esc(q.rec||"")}">${q.analysts} analist</span>`);
    if(p.length)metrics=`<div class="metrics">${p.join("")}</div>`;
  }
  const convTools=`<span class="conv" title="Konviksiyon ${c.conv||0}/3">${dots}</span>
    <span class="co-tools">${starBtns}<button class="iconbtn" data-act="editCo" data-id="${c.id}" title="Düzenle">✎</button>
    <button class="iconbtn del" data-act="delCo" data-id="${c.id}" title="Sil">✕</button></span>`;
  const nameLine=`${esc(c.name||"—")} ${sizeTag}${mcTag}`;
  // Tek sektör seçili: solda finansallar, ORTADA yazı, sağda eksenli grafik (aralık kutulu)
  if(ui.sectorFilter.size===1){
    const T=esc(c.ticker);
    const ir=inlineRange[c.ticker.toUpperCase()]||"6A";
    let chartBlock;
    if(hasHist){
      const btns=RANGES.map(r=>`<button class="ir ${ir===r[0]?'on':''}" data-ir="${r[0]}" data-spark="${esc(c.ticker.toUpperCase())}">${r[0]}</button>`).join("");
      chartBlock=`<div class="cochart-wrap">
        <div class="irange">${btns}</div>
        <canvas class="cochart" data-spark="${esc(c.ticker.toUpperCase())}" data-chart="${T}" width="280" height="200"></canvas>
      </div>`;
    }else{
      chartBlock=`<div class="cochart-wrap"><div class="cochart noh">grafik yok</div></div>`;
    }
    return `<div class="co cofx">
      <div class="cofx-fin">
        <div class="cofx-id"><span class="${tkrCls}"${tkrAttr}>${T}</span>${px}</div>
        ${metrics}
        <div class="cofx-cv">${convTools}</div>
      </div>
      <div class="cofx-text">
        <div class="cofx-name">${nameLine}${nb}</div>
        ${c.note?`<div class="note">${esc(c.note)}</div>`:""}
      </div>
      ${chartBlock}
    </div>`;
  }
  return `<div class="co">
    <div class="co-id"><span class="${tkrCls}"${tkrAttr}>${esc(c.ticker)}</span>${px}${metrics}${spark}</div>
    <div class="co-right"><span class="conv" title="Konviksiyon ${c.conv||0}/3">${dots}</span>
    <span class="co-tools">${starBtns}<button class="iconbtn" data-act="editCo" data-id="${c.id}" title="Düzenle">✎</button>
    <button class="iconbtn del" data-act="delCo" data-id="${c.id}" title="Sil">✕</button></span></div>
    <div class="meta"><div class="nm">${esc(c.name||"—")} ${sizeTag}${mcTag}${nb}</div>${c.note?`<div class="note">${esc(c.note)}</div>`:""}</div></div>`;
}

function wireForm(root,sec,co){
  const form=root.querySelector('[data-form="1"]');if(!form)return;
  let conv=co?co.conv:2;
  form.querySelectorAll('.f-conv button').forEach(b=>b.onclick=()=>{conv=+b.dataset.c;form.querySelectorAll('.f-conv button').forEach(x=>x.classList.toggle('sel',+x.dataset.c===conv));});
  form.querySelector('.f-cancel').onclick=()=>{ui.openForm=null;render(true);};
  form.querySelector('.f-save').onclick=()=>{
    const ticker=form.querySelector('.f-ticker').value.trim().toUpperCase();
    if(!ticker){flash("Ticker gerekli");return;}
    const data={ticker,name:form.querySelector('.f-name').value.trim(),note:form.querySelector('.f-note').value.trim(),size:form.querySelector('.f-size').value,conv};
    const s=state.sectors.find(s=>s.id===sec.id);
    if(co){Object.assign(co,data);}else{data.id=uid();s.companies.push(data);}
    ui.openForm=null;render();flash(co?"Güncellendi":ticker+" eklendi");
  };
  const t=form.querySelector('.f-ticker');if(t&&!co&&!t.value)t.focus();
}

  document.querySelectorAll('.co-edit-host').forEach(host=>{
    const id=host.dataset.id;const sec=state.sectors.find(s=>s.companies.some(c=>c.id===id));const co=sec.companies.find(c=>c.id===id);
    wireForm(host,sec,co);
  });
  // re-focus add form if open
  if(ui.openForm&&!ui.openForm.companyId){const sec=state.sectors.find(s=>s.id===ui.openForm.sectorId);if(sec)wireForm(document,sec,null);}
}

/* ---------- sector ops ---------- */
function addSector(){
  const name=prompt("Yeni sektör adı:");if(!name)return;
  const thesis=prompt("Kısa tez / bu sektörü nasıl tanımlıyorsun? (boş bırakabilirsin)")||"";
  state.sectors.push({id:"s"+(state.seq=(state.seq||0)+1),name:name.trim(),thesis:thesis.trim(),suggestions:[],companies:[]});
  render();flash("Sektör eklendi");
}
function editSector(id){
  const s=state.sectors.find(s=>s.id===id);
  const name=prompt("Sektör adı:",s.name);if(name===null)return;
  const thesis=prompt("Tez:",s.thesis);if(thesis===null)return;
  s.name=name.trim();s.thesis=thesis.trim();render();
}
function delSector(id){
  const s=state.sectors.find(s=>s.id===id);
  if(!confirm(`"${s.name}" sektörü ve içindeki ${s.companies.length} şirket silinsin mi?`))return;
  state.sectors=state.sectors.filter(s=>s.id!==id);render();flash("Sektör silindi");
}

document.getElementById("modalX").onclick=closeChart;
document.getElementById("modalBg").onclick=closeChart;
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&!document.getElementById("chartModal").hidden)closeChart();});

/* ================= HABER & RAPOR ================= */
function fmtNewsTime(t){
  if(!t)return "";
  try{const d=new Date(t);if(isNaN(d))return "";return d.toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){return "";}
}
function tickerSectorName(tk){tk=(tk||"").toUpperCase();for(const s of state.sectors){if(s.companies.some(c=>c.ticker.toUpperCase()===tk))return s.name;}return "";}
function isTracked(tk){tk=(tk||"").toUpperCase();return state.sectors.some(s=>s.companies.some(c=>c.ticker.toUpperCase()===tk));}
function newsCountFor(tk){if(!newsData||!newsData.news)return 0;const a=newsData.news[(tk||"").toUpperCase()];return a?a.length:0;}
function allNewsItems(){
  if(!newsData||!newsData.news)return [];
  const out=[];
  for(const tk in newsData.news){if(!isTracked(tk))continue;(newsData.news[tk]||[]).forEach(n=>out.push(Object.assign({ticker:tk},n)));}
  out.sort((a,b)=>(b.time||"").localeCompare(a.time||""));
  return out;
}
let newsFilter="";
function openNews(ticker){newsFilter=ticker||"";document.getElementById("newsModal").hidden=false;renderNews();}
function closeNews(){document.getElementById("newsModal").hidden=true;}
function renderNews(){
  const body=document.getElementById("newsBody"),ctl=document.getElementById("newsControls");
  if(!newsData||!newsData.news){body.innerHTML=`<div class="news-empty">Haber verisi yok. GitHub'a bağlan; haberler her gece otomatik koşuyla gelir (elle: Actions → Run workflow).</div>`;ctl.innerHTML="";return;}
  const tickers=Object.keys(newsData.news).filter(isTracked).sort();
  let lbl="";if(newsData.updated){try{lbl=new Date(newsData.updated).toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}catch(e){}}
  ctl.innerHTML=`<div class="sheet-controls">
    <select class="minisel" id="newsFilterSel"><option value="">Tüm hisseler</option>${tickers.map(t=>`<option value="${esc(t)}" ${newsFilter.toUpperCase()===t.toUpperCase()?"selected":""}>${esc(t)}</option>`).join("")}</select>
    ${lbl?`<span class="news-meta">güncelleme ${esc(lbl)}</span>`:""}</div>`;
  document.getElementById("newsFilterSel").onchange=function(){newsFilter=this.value;renderNews();};
  let items=allNewsItems();
  if(newsFilter)items=items.filter(n=>n.ticker.toUpperCase()===newsFilter.toUpperCase());
  if(!items.length){body.innerHTML=`<div class="news-empty">Gösterilecek haber yok.</div>`;return;}
  body.innerHTML=items.slice(0,150).map(n=>`<div class="news-item">
    <span class="news-tk" title="${esc(tickerSectorName(n.ticker))}">${esc(n.ticker)}</span>
    <div class="news-main">
      ${n.url?`<a class="news-title" href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a>`:`<span class="news-title">${esc(n.title)}</span>`}
      <div class="news-meta">${esc(n.publisher||"")}${n.publisher&&n.time?" · ":""}${esc(fmtNewsTime(n.time))}</div>
    </div></div>`).join("");
}

function mdLite(s){
  s=esc(s||"");
  s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.replace(/(^|\s)((https?:\/\/[^\s<]+))/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<i>$2</i>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  return s.replace(/\n/g,'<br>');
}
function todayStr(){try{return new Date().toISOString().slice(0,10);}catch(e){return "";}}
let reportForm=null;      // {id} düzenle, {} yeni, null kapalı
let reportSecFilter="";
function openReports(){if(!state.reports)state.reports=[];document.getElementById("reportsModal").hidden=false;reportForm=null;renderReports();}
function closeReports(){document.getElementById("reportsModal").hidden=true;reportForm=null;}
function renderReports(){
  if(!state.reports)state.reports=[];
  const body=document.getElementById("reportsBody"),ctl=document.getElementById("reportsControls");
  ctl.innerHTML=`<div class="sheet-controls">
    <select class="minisel" id="repSecFilter"><option value="">Tüm sektörler</option>${state.sectors.map(s=>`<option value="${s.id}" ${reportSecFilter===s.id?"selected":""}>${esc(s.name)}</option>`).join("")}</select>
    <button class="btn primary sm" id="repAdd">+ Rapor ekle</button></div>`;
  document.getElementById("repSecFilter").onchange=function(){reportSecFilter=this.value;renderReports();};
  document.getElementById("repAdd").onclick=()=>{reportForm={};renderReports();body.scrollTop=0;};
  let html="";
  if(reportForm)html+=reportFormHtml(reportForm);
  let reps=state.reports.slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  if(reportSecFilter)reps=reps.filter(r=>r.sectorId===reportSecFilter);
  if(!reps.length&&!reportForm)html+=`<div class="news-empty">Henüz rapor yok. "+ Rapor ekle" ile başla.</div>`;
  html+=reps.map(r=>{
    if(reportForm&&reportForm.id===r.id)return "";   // bu rapor yukarıda form olarak açık
    const sec=state.sectors.find(s=>s.id===r.sectorId);
    const tags=[];if(sec)tags.push(`<span class="rep-tag sec">${esc(sec.name)}</span>`);
    (r.tickers||[]).forEach(t=>tags.push(`<span class="rep-tag">${esc(t)}</span>`));
    return `<div class="rep-card">
      <div class="rep-top"><span class="rep-title">${esc(r.title||"(başlıksız)")}</span><span class="rep-date">${esc(r.date||"")}</span></div>
      ${tags.length?`<div class="rep-tags">${tags.join("")}</div>`:""}
      <div class="rep-body">${mdLite(r.body)}</div>
      <div class="rep-foot">
        <span class="rep-author">${esc(r.author||"")}</span>
        ${r.link?`<a class="rep-link" href="${esc(r.link)}" target="_blank" rel="noopener">🔗 Bağlantı</a>`:""}
        <button class="rep-edit" data-edit="${r.id}">düzenle</button>
        <button class="rep-edit del" data-del="${r.id}">sil</button>
      </div></div>`;
  }).join("");
  body.innerHTML=html;
  if(reportForm)wireReportForm();
  body.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{reportForm={id:b.dataset.edit};renderReports();body.scrollTop=0;});
  body.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{if(!confirm("Rapor silinsin mi?"))return;state.reports=state.reports.filter(x=>x.id!==b.dataset.del);render();flash("Rapor silindi");});
}
function reportFormHtml(rf){
  const r=rf.id?state.reports.find(x=>x.id===rf.id):null;const v=r||{};
  return `<div class="rep-form" data-repform="1">
    <div class="row">
      <div style="flex:2"><label>Başlık</label><input class="rf-title" value="${esc(v.title||"")}" placeholder="Rapor başlığı"/></div>
      <div style="flex:0 0 140px"><label>Tarih</label><input class="rf-date" type="date" value="${esc(v.date||todayStr())}"/></div>
    </div>
    <div class="row">
      <div><label>Sektör (ops.)</label><select class="rf-sec"><option value="">—</option>${state.sectors.map(s=>`<option value="${s.id}" ${v.sectorId===s.id?"selected":""}>${esc(s.name)}</option>`).join("")}</select></div>
      <div><label>Hisseler (virgülle)</label><input class="rf-tickers" value="${esc((v.tickers||[]).join(", "))}" placeholder="OKLO, BE"/></div>
      <div><label>Yazar (ops.)</label><input class="rf-author" value="${esc(v.author||"")}" placeholder="—"/></div>
    </div>
    <div><label>Metin — markdown: **kalın** *italik* [bağlantı](url)</label><textarea class="rf-body" placeholder="Analiz / tez metni...">${esc(v.body||"")}</textarea></div>
    <div style="margin-top:9px"><label>Dış bağlantı (ops.)</label><input class="rf-link" value="${esc(v.link||"")}" placeholder="https://drive.google.com/..."/></div>
    <div class="actions"><button class="btn ghost" id="rfCancel">İptal</button><button class="btn primary" id="rfSave">${r?"Güncelle":"Kaydet"}</button></div>
  </div>`;
}
function wireReportForm(){
  const f=document.querySelector('[data-repform="1"]');if(!f)return;
  document.getElementById("rfCancel").onclick=()=>{reportForm=null;renderReports();};
  document.getElementById("rfSave").onclick=()=>{
    const title=f.querySelector(".rf-title").value.trim();
    if(!title){flash("Başlık gerekli");return;}
    const data={title,date:f.querySelector(".rf-date").value||todayStr(),sectorId:f.querySelector(".rf-sec").value||"",
      tickers:f.querySelector(".rf-tickers").value.split(",").map(s=>s.trim().toUpperCase()).filter(Boolean),
      author:f.querySelector(".rf-author").value.trim(),body:f.querySelector(".rf-body").value,link:f.querySelector(".rf-link").value.trim()};
    if(!state.reports)state.reports=[];
    if(reportForm.id){const r=state.reports.find(x=>x.id===reportForm.id);if(r)Object.assign(r,data);}
    else{data.id=uid();state.reports.unshift(data);}
    reportForm=null;render();flash("Rapor kaydedildi");
  };
}
document.getElementById("newsBtn").onclick=()=>openNews("");
document.getElementById("reportsBtn").onclick=openReports;
document.querySelectorAll('[data-close="news"]').forEach(el=>el.onclick=closeNews);
document.querySelectorAll('[data-close="reports"]').forEach(el=>el.onclick=closeReports);
document.addEventListener("keydown",e=>{if(e.key!=="Escape")return;if(!document.getElementById("newsModal").hidden)closeNews();else if(!document.getElementById("reportsModal").hidden)closeReports();});

/* ---------- startup ---------- */
async function init(){
  state=loadLocal();              // önce yereldeki son kopyayı göster (anında)
  render(true);
  if(!IN_FRAME && ghReady()){
    try{await ghLoadData();await ghLoadPrice();await ghLoadNews();await ghLoadRegime();startGitPoll();render(true);}
    catch(e){flash("GitHub bağlantı hatası: "+e.message);}
  }
}
init();
</script>
